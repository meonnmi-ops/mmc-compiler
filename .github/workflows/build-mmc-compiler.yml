name: Build MMC Compiler

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  LLVM_VERSION: "18"

jobs:
  build-llvm-mmc:
    name: Build MMC Compiler (ARM64)
    runs-on: ubuntu-24.04-arm
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          clang-${{ env.LLVM_VERSION }} \
          lld-${{ env.LLVM_VERSION }} \
          llvm-${{ env.LLVM_VERSION }}-dev \
          libllvm${{ env.LLVM_VERSION }} \
          git \
          build-essential
      shell: bash
      
    - name: Configure LLVM
      run: |
        echo "LLVM Config:"
        llvm-config-${{ env.LLVM_VERSION }} --version
        llvm-config-${{ env.LLVM_VERSION }} --includedir
        llvm-config-${{ env.LLVM_VERSION }} --libdir
      shell: bash
      
    - name: Build llama.cpp (GGML)
      run: |
        git clone --depth 1 https://github.com/ggerganov/llama.cpp.git
        cd llama.cpp
        cmake -B build -S . -DLLAMA_BUILD_TESTS=OFF
        cmake --build build --config Release
        echo "LLAMA_CPP_PATH=$GITHUB_WORKSPACE/llama.cpp" >> $GITHUB_ENV
      shell: bash
      
    - name: Configure MMC Compiler
      run: |
        cmake -B build -S . \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_INSTALL_PREFIX=$GITHUB_WORKSPACE/install \
          -DLLVM_DIR=$(llvm-config-${{ env.LLVM_VERSION }} --cmakedir)
      shell: bash
      
    - name: Build MMC Compiler
      run: |
        cmake --build build --config ${{ env.BUILD_TYPE }} --target mmc
        echo "Build completed!"
        ls -la bin/
      shell: bash
      
    - name: Test Compiler Version
      run: |
        ./bin/mmc --version
      shell: bash
      
    - name: Compile Sample Programs
      run: |
        # Compile hello world
        ./bin/mmc -o examples/hello examples/hello.mmc
        
        # Compile AI example (IR only for now)
        ./bin/mmc -S -o examples/sample_ai.ll examples/sample_ai.mmc
        
        echo "Sample programs compiled!"
        ls -la examples/
      shell: bash
      
    - name: Run Tests
      run: |
        echo "Testing compiled binary..."
        if [ -f examples/hello ]; then
          chmod +x examples/hello
          ./examples/hello || echo "Binary execution test (expected to fail without full runtime)"
        fi
      shell: bash
      
    - name: Upload Compiler Binary
      uses: actions/upload-artifact@v4
      with:
        name: mmc-compiler-arm64
        path: |
          bin/mmc
        retention-days: 30
        
    - name: Upload Sample Binaries
      uses: actions/upload-artifact@v4
      with:
        name: mmc-samples
        path: |
          examples/*.mmc
          examples/*.ll
        retention-days: 30
        
    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          bin/mmc
          examples/*.mmc
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-termux:
    name: Build for Termux (Native)
    runs-on: ubuntu-24.04-arm
    needs: build-llvm-mmc
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4
      
    - name: Setup Termux Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          clang \
          llvm-dev \
          libllvm18 \
          git \
          build-essential
      shell: bash
      
    - name: Build Native Binary
      run: |
        cmake -B build -S . -DCMAKE_BUILD_TYPE=Release
        cmake --build build --target mmc
        echo "Native build completed!"
      shell: bash
      
    - name: Upload Native Binary
      uses: actions/upload-artifact@v4
      with:
        name: mmc-native-termux
        path: bin/mmc
        retention-days: 30
